name: release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    release:
        runs-on: windows-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Prepare release folder
              shell: pwsh
              run: |
                  if (Test-Path release) {
                      Remove-Item release -Recurse -Force
                  }

                  New-Item -ItemType Directory -Path release\AltNum | Out-Null

            - name: Copy release files
              shell: pwsh
              run: |
                  Copy-Item assets release\AltNum\assets -Recurse -Force
                  Copy-Item src release\AltNum\src -Recurse -Force
                  Copy-Item tools release\AltNum\tools -Recurse -Force

                  Copy-Item build.bat release\AltNum\build.bat -Force
                  Copy-Item README.md release\AltNum\README.md -Force
                  Copy-Item LICENSE release\AltNum\LICENSE -Force

            - name: Create zip
              shell: pwsh
              run: |
                  $tag = "${{ github.ref_name }}"
                  $version = $tag -replace "^v", ""
                  $zip = "AltNum-$version.zip"

                  if (Test-Path $zip) {
                      Remove-Item $zip -Force
                  }

                  Compress-Archive `
                      -Path "release\AltNum\*" `
                      -DestinationPath $zip `
                      -Force

                  "RELEASE_ZIP=$zip" | Out-File `
                      -FilePath $env:GITHUB_ENV `
                      -Encoding ascii `
                      -Append

            - name: Decide prerelease by tag
              shell: pwsh
              run: |
                  $tag = "${{ github.ref_name }}"

                  $isRc = $false

                  if ($tag -match "-rc") {
                      $isRc = $true
                  }

                  $prerelease = "false"

                  if ($isRc) {
                      $prerelease = "true"
                  }

                  $makeLatest = "true"

                  if ($isRc) {
                      $makeLatest = "false"
                  }

                  "IS_PRERELEASE=$prerelease" | Out-File `
                      -FilePath $env:GITHUB_ENV `
                      -Encoding ascii `
                      -Append

                  "MAKE_LATEST=$makeLatest" | Out-File `
                      -FilePath $env:GITHUB_ENV `
                      -Encoding ascii `
                      -Append

            - name: Publish GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: ${{ env.RELEASE_ZIP }}
                  tag_name: ${{ github.ref_name }}
                  generate_release_notes: true
                  prerelease: ${{ env.IS_PRERELEASE }}
                  make_latest: ${{ env.MAKE_LATEST }}
